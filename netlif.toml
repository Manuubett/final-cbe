# ── Public pages — allow caching for speed ──
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/registration.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Static assets — long cache for performance ──
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
