[build]
  publish = "."
  functions = "netlify/functions"

# ── Pretty URLs — Netlify strips .html automatically ──
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ── Force HTTPS ──

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  
[[redirects]]
  from = "http://bett.website/*"
  to   = "https://bett.website/:splat"
  status = 301
  force  = true

