# ══════════════════════════════════════════════════════════════
#  SECURITY HEADERS
# ══════════════════════════════════════════════════════════════

# ── Global — every page ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com https://*.firebaseapp.com https://*.googleapis.com https://*.firebaseio.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'none'; object-src 'none'"

# ── Admin — no cache, hidden from Google ──
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow, noarchive"

# ── Owner — maximum protection ──
[[headers]]
  for = "/owner.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/owner"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, private"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

