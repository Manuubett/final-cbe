[build]
  publish = "."

# ── Force HTTPS — redirect all HTTP and www traffic ──
[[redirects]]
  from = "http://bett.website/*"
  to   = "https://bett.website/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.bett.website/*"
  to   = "https://bett.website/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.bett.website/*"
  to   = "https://bett.website/:splat"
  status = 301
  force  = true

